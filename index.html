<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Bro 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#050816;
    --card:rgba(255,255,255,.05);
    --blue:#00d4ff;
    --blue2:#007bff;
    --text:#fff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

.container{
    width:100%;
    max-width:540px;
    margin:auto;
}

/* HERO */

.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.hero-box{
    width:100%;
    min-height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:var(--card);
    backdrop-filter:blur(15px);

    border-radius:30px;

    border:1px solid rgba(255,255,255,.1);

    box-shadow:
    0 0 30px rgba(0,212,255,.15),
    0 0 60px rgba(0,212,255,.08);

    padding:25px;
}

.glow{
    color:var(--blue);

    text-shadow:
    0 0 10px var(--blue),
    0 0 20px var(--blue);
}

.hero h1{
    font-size:2.8rem;
}

.hero h2{
    margin-top:10px;
    font-size:1.3rem;
}

.hero p{
    margin-top:20px;
    line-height:1.8;
}

.clock{
    margin-top:15px;
    color:#8deaff;
}

.btn{
    margin-top:25px;
    padding:14px 28px;
    border:none;
    border-radius:50px;
    cursor:pointer;

    color:white;

    background:
    linear-gradient(
    45deg,
    var(--blue),
    var(--blue2)
    );
}

/* SECTION */

.section{
    padding:80px 15px;
}

.title{
    text-align:center;
    margin-bottom:25px;
    font-size:2rem;
}

/* GALLERY */

.slider{
    overflow:hidden;
    border-radius:25px;
    position:relative;
}

.slide{
    display:none;
}

.slide.active{
    display:block;
    animation:fade 1s;
}

.slide img{
    width:100%;
    height:100vh;
    object-fit:cover;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.96);
}
to{
opacity:1;
transform:scale(1);
}
}

/* MESSAGE */

.message{
    background:var(--card);
    padding:30px;
    border-radius:25px;
    line-height:2;
    text-align:center;
}

/* TIMELINE */

.item{
    background:var(--card);
    border-left:4px solid var(--blue);
    padding:20px;
    margin-bottom:15px;
    border-radius:15px;
}

.item h3{
    margin-bottom:10px;
}

/* MUSIC */

.music{
    position:fixed;
    right:20px;
    bottom:20px;
}

.music button{
    width:65px;
    height:65px;

    border:none;
    border-radius:50%;

    color:white;

    font-size:22px;

    cursor:pointer;

    background:
    linear-gradient(
    45deg,
    var(--blue),
    var(--blue2)
    );
}

/* FOOTER */

.footer{
    text-align:center;
    padding:50px 20px;
}

.typing{
    border-right:2px solid var(--blue);
    white-space:nowrap;
    overflow:hidden;
}

</style>
</head>
<body>

<canvas id="bg"></canvas>

<!-- =========================
UBAH BAGIAN INI SAJA
========================= -->

<script>

const DATA = {

nama : "RAHMAN",

umur : "17",

pesan : `
Selamat ulang tahun bro!

Terima kasih sudah menjadi teman terbaik.

Semoga semua impian,
rezeki, kesehatan,
dan kebahagiaan selalu menyertaimu.

Tetap jadi pribadi yang kuat,
rendah hati,
dan sukses dalam segala hal.

Happy Birthday 🎉
`,

foto : [

"https://cdn.phototourl.com/free/2026-06-07-ceb1ff41-714d-4fbf-bdab-05723d78054c.jpg",
"https://cdn.phototourl.com/free/2026-06-07-21c55919-07e3-4452-907f-a7528375fa23.jpg",
"https://cdn.phototourl.com/free/2026-06-07-cddb2cff-b667-4e89-b43b-6dcc66bb89cc.jpg",
"https://cdn.phototourl.com/free/2026-06-07-5a9c6733-f575-404a-852f-17af8d641bf9.jpg",
"https://cdn.phototourl.com/free/2026-06-07-4d734480-bbfd-4d47-b687-f7bd8228d9a2.jpg"

],

musik : "https://secure-green-jelbsqnx.edgeone.app/original%20sound%20-%20h34lthy_lif3_musicaldown.com_1780826153.mp3"

}

</script>

<div class="container">

<section class="hero">

<div class="hero-box">

<h1 class="glow">
HAPPY BIRTHDAY
</h1>

<h2 id="nama"></h2>

<div id="clock" class="clock"></div>

<p id="typing" class="typing"></p>

<button
class="btn"
onclick="document.getElementById('gallery').scrollIntoView()">
Lihat Kenangan
</button>

</div>

</section>

<section class="section" id="gallery">

<h2 class="title glow">
GALERI BRO
</h2>

<div class="slider" id="slider">

</div>

</section>

<section class="section">

<h2 class="title glow">
PERJALANAN
</h2>

<div class="item">
<h3>Awal Kenal</h3>
<p>Awal cerita yang menjadi banyak kenangan.</p>
</div>

<div class="item">
<h3>Banyak Momen</h3>
<p>Ngobrol, bercanda dan saling mendukung.</p>
</div>

<div class="item">
<h3>Hari Ini</h3>
<p>Tetap menjadi teman terbaik.</p>
</div>

</section>

<section class="section">

<h2 class="title glow">
PESAN UNTUKMU
</h2>

<div class="message">

<p id="pesan"></p>

</div>

</section>

<footer class="footer">

<h2 class="glow">
BEST BRO FOREVER 🤝
</h2>

<p>
Brother From Another Mother
</p>

</footer>

</div>

<div class="music">
<button id="musicBtn">▶</button>
</div>

<audio id="audio" loop>
<source src="">
</audio>

<script>

/* DATA */

nama.innerHTML =
DATA.nama + " • " + DATA.umur + " Tahun";

pesan.innerText =
DATA.pesan;

document.querySelector(
"audio source"
).src = DATA.musik;

/* CLOCK */

function updateClock(){

clock.innerHTML =
new Date().toLocaleString("id-ID");

}

setInterval(updateClock,1000);

updateClock();

/* TYPING */

const text =
"Untuk teman terbaik yang selalu ada dalam setiap perjalanan.";

let i = 0;

function type(){

if(i < text.length){

typing.innerHTML += text.charAt(i);

i++;

setTimeout(type,50);

}

}

type();

/* GALLERY */

const slider =
document.getElementById("slider");

DATA.foto.forEach((foto,index)=>{

slider.innerHTML +=

`<div class="slide ${index===0?'active':''}">
<img src="${foto}">
</div>`;

});

let current = 0;

const slides =
document.querySelectorAll(".slide");

setInterval(()=>{

slides[current].classList.remove("active");

current++;

if(current >= slides.length){
current = 0;
}

slides[current].classList.add("active");

},3000);

/* MUSIC */

const audio =
document.getElementById("audio");

audio.load();

let play = false;

musicBtn.onclick = ()=>{

if(!play){

audio.play();

musicBtn.innerHTML="⏸";

play=true;

}else{

audio.pause();

musicBtn.innerHTML="▶";

play=false;

}

};

/* PARTICLES */

const canvas =
document.getElementById("bg");

const ctx =
canvas.getContext("2d");

function resize(){

canvas.width =
window.innerWidth;

canvas.height =
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);

const particles=[];

for(let i=0;i<100;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-0.5)*0.6,
dy:(Math.random()-0.5)*0.6

});

}

function animate(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

particles.forEach(p=>{

ctx.beginPath();

ctx.arc(
p.x,
p.y,
p.r,
0,
Math.PI*2
);

ctx.fillStyle =
"rgba(0,212,255,.8)";

ctx.fill();

p.x += p.dx;
p.y += p.dy;

if(p.x<0 || p.x>canvas.width)
p.dx *= -1;

if(p.y<0 || p.y>canvas.height)
p.dy *= -1;

});

requestAnimationFrame(
animate
);

}

animate();

</script>

</body>
  </html>
