<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Termux Bible | Hacker's Digital Grimoire (Ribuan Perintah)</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #080C0A;
      font-family: 'Rajdhani', sans-serif;
      color: #C8FAD6;
      overflow-x: hidden;
    }
    #matrixCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.3;
    }
    .app-wrapper {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(0px);
    }
    .sidebar {
      width: 280px;
      background: #0A0F0A;
      border-right: 2px solid #003B00;
      padding: 1.8rem 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      box-shadow: 4px 0 20px rgba(0, 255, 65, 0.08);
      z-index: 3;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: #1A1F1A; }
    .sidebar::-webkit-scrollbar-thumb { background: #00FF41; border-radius: 4px; }
    .logo-area {
      margin-bottom: 2.5rem;
      border-bottom: 1px solid #003B00;
      padding-bottom: 1rem;
    }
    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.6rem;
      font-weight: bold;
      color: #00FF41;
      text-shadow: 0 0 5px #00FF41;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sub {
      font-size: 0.75rem;
      color: #6e9f7a;
      margin-top: 6px;
    }
    .nav-category h3 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #00FF41;
      margin-bottom: 1rem;
      border-left: 3px solid #00FF41;
      padding-left: 12px;
    }
    .cat-list { list-style: none; margin-left: 6px; }
    .cat-item {
      margin-bottom: 10px;
      cursor: pointer;
      padding: 8px 12px;
      font-weight: 500;
      font-size: 1rem;
      color: #C8FAD6;
      border-radius: 6px;
      transition: all 0.2s ease;
      border-left: 2px solid transparent;
    }
    .cat-item:hover, .cat-item.active {
      background: #1A2A1A;
      color: #00FF41;
      border-left-color: #00FF41;
      transform: translateX(4px);
    }
    .cat-item.active { background: #003B00; box-shadow: 0 0 8px rgba(0,255,65,0.2); }
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-y: auto;
      background: rgba(8, 12, 10, 0.92);
      backdrop-filter: blur(2px);
    }
    .terminal-header {
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #003B00;
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
    }
    .page-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.6rem;
      color: #00FF41;
    }
    .badge {
      background: #1A1F1A;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'Share Tech Mono', monospace;
      color: #00FF41;
      border: 1px solid #2a4a2a;
    }
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1.2rem;
    }
    .lesson-card {
      background: #0F140F;
      border: 1px solid #1F3A1F;
      border-radius: 14px;
      padding: 1.2rem;
      cursor: pointer;
      transition: 0.25s;
    }
    .lesson-card:hover {
      border-color: #00FF41;
      transform: translateY(-4px);
      background: #111B11;
    }
    .lesson-card h3 {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.25rem;
      color: #00FF41;
    }
    .lesson-command {
      background: #080C0A;
      padding: 6px 10px;
      border-radius: 8px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      color: #A0F0B0;
      margin: 10px 0;
      border-left: 3px solid #00FF41;
    }
    .detail-panel {
      margin-top: 2rem;
      background: #0A100A;
      border: 1px solid #1E3A1E;
      border-radius: 20px;
      padding: 1.5rem;
      animation: glitchFade 0.35s ease;
    }
    @keyframes glitchFade {
      0% { opacity: 0; transform: scale(0.98); filter: blur(2px);}
      100% { opacity: 1; transform: scale(1); filter: blur(0);}
    }
    .decrypt-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px dashed #00FF41;
      padding-bottom: 12px;
      margin-bottom: 20px;
    }
    .decrypt-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.8rem;
      color: #00FF41;
    }
    .back-btn {
      background: none;
      border: 1px solid #00FF41;
      color: #00FF41;
      padding: 6px 14px;
      border-radius: 30px;
      cursor: pointer;
    }
    .back-btn:hover {
      background: #00FF41;
      color: #080C0A;
    }
    .info-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: #00FF41;
      background: #1A1F1A;
      display: inline-block;
      padding: 2px 12px;
      border-radius: 14px;
      margin-bottom: 8px;
    }
    .info-content, .code-block {
      background: #0E130E;
      padding: 12px 16px;
      border-radius: 12px;
      border-left: 3px solid #00FF41;
      white-space: pre-wrap;
      font-family: 'Share Tech Mono', monospace;
      margin-bottom: 1rem;
    }
    @media (max-width: 760px) {
      .app-wrapper { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; border-right: none; }
    }
  </style>
</head>
<body>
<canvas id="matrixCanvas"></canvas>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="logo-area">
      <div class="logo">◢ TERMUX::BIBLE <small>v.2.0</small></div>
      <div class="sub">// ribuan perintah & tools</div>
    </div>
    <div class="nav-category">
      <h3>⟫ KATEGORI PERANGKAT</h3>
      <ul class="cat-list" id="categoryList"></ul>
    </div>
    <div style="margin-top:2rem; font-size:0.7rem; text-align:center; opacity:0.6;">
      <span>⚡ decrypt the matrix</span><br>
      <span id="lessonCountInfo"></span>
    </div>
  </aside>
  <main class="main-content" id="mainContent">
    <div class="terminal-header">
      <div class="page-title">>_ lessons.arc</div>
      <div class="badge">[ encrypted :: 0x7F3 ]</div>
    </div>
    <div id="dynamicArea"></div>
  </main>
</div>

<script>
  // ======================== GENERATOR RATUSAN/RIBUAN PELAJARAN ========================
  // Anda bisa mengubah TOTAL_LESSONS menjadi 1000 atau lebih (semakin banyak semakin lambat sedikit)
  const TOTAL_LESSONS = 520;  // <-- ubah sesuai keinginan (520 sudah cukup padat)
  
  // Daftar kategori yang akan digunakan
  const CATEGORY_POOL = [
    "Dasar Termux", "Jaringan & Scanning", "Keamanan & Hacking", "Pemrograman", 
    "Social Engineering", "WiFi Pentest", "Forensics", "Reverse Engineering",
    "Otomatisasi", "Database Tools", "Web Exploitation", "Cryptography", "OSINT",
    "Privilege Escalation", "Malware Analysis", "Cloud & API", "Monitoring", "Utility"
  ];
  
  // Kumpulan template perintah (nama tools populer + random)
  const baseCommands = [
    { name: "nmap", baseDesc: "Pemindaian port dan jaringan" },
    { name: "hydra", baseDesc: "Password brute-force" },
    { name: "sqlmap", baseDesc: "SQL injection automation" },
    { name: "metasploit", baseDesc: "Framework exploit" },
    { name: "aircrack-ng", baseDesc: "Cracking WEP/WPA" },
    { name: "john", baseDesc: "Password cracker" },
    { name: "nikto", baseDesc: "Web server scanner" },
    { name: "gobuster", baseDesc: "Directory/file brute-force" },
    { name: "wpscan", baseDesc: "WordPress vulnerability scanner" },
    { name: "hashcat", baseDesc: "Advanced password recovery" },
    { name: "tshark", baseDesc: "Network protocol analyzer" },
    { name: "tcpdump", baseDesc: "Packet capture" },
    { name: "curl", baseDesc: "Transfer data with URLs" },
    { name: "wget", baseDesc: "Non-interactive downloader" },
    { name: "git", baseDesc: "Version control" },
    { name: "python3", baseDesc: "Python interpreter" },
    { name: "perl", baseDesc: "Perl scripting" },
    { name: "ruby", baseDesc: "Ruby environment" },
    { name: "node", baseDesc: "Node.js runtime" },
    { name: "php", baseDesc: "PHP CLI" },
    { name: "gcc", baseDesc: "GNU C compiler" },
    { name: "make", baseDesc: "Build automation" },
    { name: "nano", baseDesc: "Terminal text editor" },
    { name: "vim", baseDesc: "Advanced text editor" },
    { name: "termux-api", baseDesc: "Android hardware access" },
    { name: "termux-elf-cleaner", baseDesc: "ELF binary cleaner" },
    { name: "proot", baseDesc: "User-space chroot" },
    { name: "tsu", baseDesc: "Switch to root (via sudo)" },
    { name: "neofetch", baseDesc: "System info display" },
    { name: "htop", baseDesc: "Interactive process viewer" },
    { name: "ranger", baseDesc: "Console file manager" },
    { name: "ffmpeg", baseDesc: "Multimedia processing" },
    { name: "youtube-dl", baseDesc: "Download video/audio" },
    { name: "ngrok", baseDesc: "Secure tunnels to localhost" },
    { name: "ssh", baseDesc: "Secure shell client" },
    { name: "scp", baseDesc: "Secure copy" },
    { name: "rsync", baseDesc: "Fast file syncing" },
    { name: "socat", baseDesc: "Multipurpose relay" },
    { name: "netcat", baseDesc: "Network debugging tool" },
    { name: "telnet", baseDesc: "Telnet client" }
  ];
  
  // Fungsi untuk menghasilkan penjelasan dinamis
  function generateExplanation(cmdName, category) {
    return `${cmdName} adalah tool ${category.toLowerCase()} yang powerful di Termux. Memungkinkan Anda melakukan berbagai tugas teknis dengan efisien. Dokumentasi lengkap tersedia dengan menjalankan '${cmdName} --help'.`;
  }
  
  function generateExample(cmdName) {
    const examples = {
      nmap: "nmap -sV -p- 192.168.1.1",
      hydra: "hydra -l admin -P passlist.txt ssh://target.com",
      sqlmap: "sqlmap -u 'http://target.com/page?id=1' --dbs",
      metasploit: "msfconsole -q -x 'use exploit/multi/handler; set PAYLOAD android/meterpreter/reverse_tcp'",
      python3: "python3 -c 'print(\"Hack The Planet\")'",
      git: "git clone https://github.com/tool/repo.git",
      curl: "curl -I https://example.com",
      wget: "wget -r https://target.com/files",
      default: `${cmdName} --help`
    };
    return examples[cmdName] || `# Contoh penggunaan:\n${cmdName} [opsi] <target>\n# Contoh: ${cmdName} -v parameter`;
  }
  
  function generateUse(cmdName, category) {
    const uses = {
      nmap: "Audit keamanan jaringan, menemukan host aktif dan port terbuka.",
      hydra: "Menguji kekuatan password pada berbagai layanan.",
      sqlmap: "Mendeteksi dan mengeksploitasi kerentanan SQL injection.",
      metasploit: "Simulasi serangan dan pengujian penetrasi profesional.",
      python3: "Membangun exploit, otomatisasi, dan analisis data.",
      git: "Mengunduh repository tools hacking terbaru.",
      curl: "Mengirim request HTTP custom, testing API.",
      default: `Digunakan untuk ${category.toLowerCase()} di lingkungan Termux.`
    };
    return uses[cmdName] || uses.default;
  }
  
  function generateHowItWorks(cmdName) {
    return `${cmdName} bekerja dengan memanfaatkan protokol dan library yang tersedia di Termux. Proses internalnya melibatkan interaksi dengan kernel Android melalui sistem call. Baca dokumentasi untuk teknis lebih dalam.`;
  }
  
  function generateInstallation(cmdName) {
    // Simulasi apakah tool sudah bawaan atau perlu install
    const builtin = ["pkg", "apt", "cd", "ls", "cat", "echo", "mkdir", "rm", "mv", "cp", "chmod"];
    if (builtin.includes(cmdName)) return "Sudah tersedia bawaan Termux, tidak perlu install.";
    return `pkg install ${cmdName}`;
  }
  
  // Membuat ribuan lessons
  let lessonsData = [];
  let idCounter = 1;
  
  for (let i = 0; i < TOTAL_LESSONS; i++) {
    // Pilih command dasar secara berulang dengan variasi
    const base = baseCommands[i % baseCommands.length];
    const cmdName = base.name;
    // Variasi nama unik (tambahkan angka jika perlu agar tidak terlalu monoton)
    let uniqueName = cmdName;
    if (i >= baseCommands.length) {
      uniqueName = `${cmdName}-var${Math.floor(i / baseCommands.length)}`;
    }
    // Pilih kategori secara acak namun tetap proporsional
    const category = CATEGORY_POOL[i % CATEGORY_POOL.length];
    const perintah = uniqueName;
    const deskripsi = `${base.baseDesc} (versi ${Math.floor(i/10)+1}) - tool esensial di Termux.`;
    const penjelasan = generateExplanation(uniqueName, category);
    const contoh = generateExample(cmdName);
    const kegunaan = generateUse(cmdName, category);
    const caraKerja = generateHowItWorks(uniqueName);
    let pemasangan = generateInstallation(cmdName);
    // Jika nama mengandung 'var', tetap install dengan nama asli
    if (uniqueName !== cmdName) pemasangan = `pkg install ${cmdName} # atau varian khusus`;
    
    lessonsData.push({
      id: idCounter++,
      nama: uniqueName.charAt(0).toUpperCase() + uniqueName.slice(1),
      kategori: category,
      perintah: perintah,
      deskripsi: deskripsi,
      penjelasan: penjelasan,
      contoh: contoh,
      kegunaan: kegunaan,
      caraKerja: caraKerja,
      pemasangan: pemasangan
    });
  }
  
  // Tambahkan beberapa tools super spesifik agar terasa lebih kaya (opsional)
  const extraTools = [
    { nama: "BeEF", kategori: "Web Exploitation", perintah: "beef-xss", deskripsi: "Browser Exploitation Framework", penjelasan: "Mengontrol browser target melalui hook.", contoh: "./beef", kegunaan: "Social engineering dan client-side attacks", caraKerja: "Menyisipkan javascript hook", pemasangan: "pkg install beef" },
    { nama: "TheHarvester", kategori: "OSINT", perintah: "theHarvester", deskripsi: "Mengumpulkan email, subdomain", penjelasan: "OSINT tool untuk reconnaissance.", contoh: "theHarvester -d example.com -b google", kegunaan: "Footprinting", caraKerja: "Query berbagai mesin pencari", pemasangan: "pkg install theharvester" },
    { nama: "Sherlock", kategori: "OSINT", perintah: "sherlock", deskripsi: "Cari username di social media", penjelasan: "Menemukan akun seseorang di puluhan platform.", contoh: "sherlock username", kegunaan: "Investigasi digital", caraKerja: "HTTP request ke API platform", pemasangan: "git clone https://github.com/sherlock-project/sherlock" }
  ];
  extraTools.forEach(t => lessonsData.push({ id: idCounter++, ...t }));
  
  // ======================== SISA LOGIKA UI SAMA DENGAN SEBELUMNYA (dioptimasi) ========================
  let allCategories = [...new Set(lessonsData.map(l => l.kategori))];
  let activeCategory = allCategories[0];
  let currentView = "list";
  let selectedLesson = null;
  
  const dynamicArea = document.getElementById("dynamicArea");
  const categoryListEl = document.getElementById("categoryList");
  const lessonCountInfo = document.getElementById("lessonCountInfo");
  lessonCountInfo.innerText = `📚 ${lessonsData.length} lessons loaded`;
  
  function renderSidebar() {
    categoryListEl.innerHTML = "";
    allCategories.forEach(cat => {
      const li = document.createElement("li");
      li.className = `cat-item ${activeCategory === cat ? 'active' : ''}`;
      li.textContent = `⟫ ${cat} (${lessonsData.filter(l=>l.kategori===cat).length})`;
      li.addEventListener("click", () => {
        activeCategory = cat;
        currentView = "list";
        selectedLesson = null;
        renderSidebar();
        renderMainContent();
      });
      categoryListEl.appendChild(li);
    });
  }
  
  function escapeHtml(str) {
    if (!str) return "";
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  function renderLessonDetail(lesson) {
    dynamicArea.innerHTML = `
      <div class="detail-panel">
        <div class="decrypt-header">
          <span class="decrypt-title">◈ ${escapeHtml(lesson.nama)}</span>
          <button class="back-btn" id="backToListBtn">↺ KEMBALI KE DAFTAR</button>
        </div>
        <div><div class="info-label">$ command</div><div class="code-block">${escapeHtml(lesson.perintah)}</div></div>
        <div><div class="info-label">📘 PENJELASAN</div><div class="info-content">${escapeHtml(lesson.penjelasan)}</div></div>
        <div><div class="info-label">⚙️ CONTOH</div><div class="code-block">${escapeHtml(lesson.contoh)}</div></div>
        <div><div class="info-label">🎯 KEGUNAAN</div><div class="info-content">${escapeHtml(lesson.kegunaan)}</div></div>
        <div><div class="info-label">🧠 CARA KERJA</div><div class="info-content">${escapeHtml(lesson.caraKerja)}</div></div>
        <div><div class="info-label">📦 PEMASANGAN</div><div class="code-block">${escapeHtml(lesson.pemasangan)}</div></div>
        <div style="font-size:0.7rem; text-align:right; opacity:0.7;">🔓 decrypted | secure channel</div>
      </div>
    `;
    document.getElementById("backToListBtn")?.addEventListener("click", () => {
      currentView = "list";
      selectedLesson = null;
      renderMainContent();
    });
    currentView = "detail";
  }
  
  function renderLessonList() {
    const filtered = lessonsData.filter(l => l.kategori === activeCategory);
    if (filtered.length === 0) {
      dynamicArea.innerHTML = `<div class="empty-state">⚠️ Tidak ada pelajaran di kategori ini.</div>`;
      return;
    }
    let cardsHtml = `<div class="lessons-grid">`;
    filtered.forEach(lesson => {
      cardsHtml += `
        <div class="lesson-card" data-id="${lesson.id}">
          <h3>◉ ${escapeHtml(lesson.nama)}</h3>
          <div class="lesson-command">$ ${escapeHtml(lesson.perintah)}</div>
          <div class="lesson-desc">${escapeHtml(lesson.deskripsi)}</div>
          <div style="margin-top:12px; font-size:0.7rem; color:#00FF41;">[ klik untuk decrypt ]</div>
        </div>
      `;
    });
    cardsHtml += `</div>`;
    dynamicArea.innerHTML = cardsHtml;
    filtered.forEach(lesson => {
      const card = document.querySelector(`.lesson-card[data-id="${lesson.id}"]`);
      if (card) card.addEventListener("click", () => {
        selectedLesson = lesson;
        // efek decrypt cepat
        dynamicArea.style.opacity = "0.6";
        setTimeout(() => {
          renderLessonDetail(lesson);
          dynamicArea.style.opacity = "1";
        }, 200);
      });
    });
    currentView = "list";
  }
  
  function renderMainContent() {
    if (currentView === "detail" && selectedLesson) renderLessonDetail(selectedLesson);
    else renderLessonList();
  }
  
  renderSidebar();
  renderMainContent();
  
  // ========== MATRIX RAIN ==========
  const canvas = document.getElementById('matrixCanvas');
  let ctx = canvas.getContext('2d');
  let width, height, fontSize = 16, drops = [], matrixChars = "01アイウエオカキクケコABCDEFGHIJKLMNOPQRSTUVWXYZ$#@&".split('');
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    let columns = Math.floor(width / fontSize);
    drops = [];
    for (let i = 0; i < columns; i++) drops[i] = Math.random() * -height;
  }
  function drawMatrix() {
    if (!ctx) return;
    ctx.fillStyle = "rgba(8, 12, 10, 0.06)";
    ctx.fillRect(0, 0, width, height);
    ctx.fillStyle = "#00FF41";
    ctx.font = fontSize + 'px "Share Tech Mono", monospace';
    for (let i = 0; i < drops.length; i++) {
      let text = matrixChars[Math.floor(Math.random() * matrixChars.length)];
      let x = i * fontSize;
      let y = drops[i] * fontSize;
      ctx.fillStyle = "#00FF41";
      ctx.fillText(text, x, y);
      if (y > height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(drawMatrix);
  }
  window.addEventListener('resize', () => { resizeCanvas(); });
  resizeCanvas();
  drawMatrix();
</script>
</body>
</html>
